syntax = "proto3";

package Proto;

enum ActionType {
	UNSPECIFIED = 0;
	WEAPONSKILL = 1;
	ABILITY = 2;
	SPELL = 3;
}

message ActionAcquired {
	string job_name = 1;
	uint32 level = 2;
}

message EntityAction {
	uint32 action_id = 1;
	string name	= 2;
	ActionAcquired acquired = 3;
	ActionType action_type = 4;
	optional float cast_time = 5;
	float recast_time = 6;
	optional int32 mp_cost = 7;
	float range = 8;
	float radius = 9;
}