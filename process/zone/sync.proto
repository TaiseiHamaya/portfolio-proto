syntax = "proto3";

package Proto;

import "common/math.proto";

message PayloadTransformSync {
	uint64 id = 1;
	uint64 timestamp = 2;
	Vector3 position = 3;
}

message PayloadPlayAction {
	uint64 id = 1;
	uint64 target_id = 2;
	uint32 action_id = 3;
	int64 timestamp = 4;
}

message PayloadEntityDamaged {
	uint64 entity_id = 2;
	int32 damage = 3;
}