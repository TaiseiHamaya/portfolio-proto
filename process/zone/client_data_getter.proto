syntax = "proto3";

package Proto;

import "common/math.proto";

message EntityData {
  uint64  entity_id = 1;
  Vector3 position  = 3;
  int32   hp        = 4;
}

message PlayerData {
  EntityData entity_data = 1;
  string     name        = 2;
}

message EnemyData {
  EntityData entity_data   = 1;
  uint64     enemy_type_id = 2;
}

message PayloadClientInitializerData {
  repeated PlayerData players = 1;
  repeated EnemyData  enemies = 2;
}
