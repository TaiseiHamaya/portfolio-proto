syntax = "proto3";

package Proto;

import "google/protobuf/empty.proto";
import "process/network/text.proto";
import "process/zone/sync.proto";
import "process/zone/enemy.proto";
import "process/zone/client_data_getter.proto";

message BroadcastStream {
  oneof payload {
    PayloadTransformSync transform_sync = 1;
    PayloadPlayAction    play_action    = 2;
    PayloadEntityDamaged entity_damaged = 3;

    PayloadTextMessage chat_message = 4;

    PayloadEnemySpawn   enemy_spawn   = 5;
    PayloadEnemyDespawn enemy_despawn = 6;

    PayloadZoneEnterNotification player_enter = 7;
    PayloadZoneExitNotification  player_exit  = 8;

	PayloadClientInitializerData client_initializer_data = 9;
  }
}

message BeginConnectGateway {
  uint64 gateway_id = 1;
}

// Zone → Gateway: broadcast message for player.
service ZoneBroadcastService {
  rpc ZoneSyncStream(BeginConnectGateway) returns (stream BroadcastStream);
}
