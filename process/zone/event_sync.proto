syntax = "proto3";

package Proto;

import "google/protobuf/empty.proto";
import "process/network/text.proto";
import "process/zone/sync.proto";
import "process/zone/enemy.proto";

// Zone → Gateway: broadcast message for player.
service ZoneBroadcastService {
  // Zone → Client: player transform sync, play action, and chat message.
  rpc SyncTransform(PayloadTransformSync) returns (google.protobuf.Empty);

  // Zone → Client: player play action and chat message.
  rpc PlayAction   (PayloadPlayAction)    returns (google.protobuf.Empty);

  // Zone → Client: player chat message.
  rpc SendChat     (PayloadTextMessage)   returns (google.protobuf.Empty);

  // Zone → Client: enemy spawn and despawn.
  rpc EnemySpawn   (PayloadEnemySpawn)   returns (google.protobuf.Empty);

  // Zone → Client: enemy spawn and despawn.
  rpc EnemyDespawn (PayloadEnemyDespawn) returns (google.protobuf.Empty);

  // Zone → Client: entity damaged.
  rpc EntityDamaged(PayloadEntityDamaged) returns (google.protobuf.Empty);

  // Zone → Client: player zone enter notification.
  rpc PlayerEnter  (PayloadZoneEnterNotification) returns (google.protobuf.Empty);

  // Zone → Client: player zone exit notification.
  rpc PlayerExit   (PayloadZoneExitNotification)  returns (google.protobuf.Empty);
}
