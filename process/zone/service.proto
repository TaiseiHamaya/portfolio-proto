syntax = "proto3";

package Proto;

import "google/protobuf/empty.proto";
import "process/network/text.proto";
import "process/zone/sync.proto";
import "process/zone/enemy.proto";

// Gateway → Zone: game state updates forwarded from clients.
// Zone → Gateway push (entity events) is handled via bidirectional streaming (future).
service ZoneService {
	// Client → Zone: player transform sync, play action, and chat message.
	rpc SyncTransform(PayloadTransformSync) returns (google.protobuf.Empty);

	// Client → Zone: player play action and chat message.
	rpc PlayAction   (PayloadPlayAction)    returns (google.protobuf.Empty);
	
	// Client → Zone: player chat message.
	rpc SendChat     (PayloadTextMessage)   returns (google.protobuf.Empty);
}
