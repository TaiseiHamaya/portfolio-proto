syntax = "proto3";

package Proto;

import "common/math.proto";

enum CategoryDbMessage {
	PLAYER_LOAD_REQUEST = 0;
	PLAYER_LOAD_RESPONSE = 1;
	PLAYER_SAVE_REQUEST = 2;
	PLAYER_SAVE_RESPONSE = 3;
}

message PayloadPlayerRecord {
	uint64 id = 1;
	string username = 2;
	Vector3 position = 3;
}

message PayloadPlayerLoadRequest {
	string username = 1;
}

message PayloadPlayerLoadResponse {
	bool is_succeeded = 1;
	PayloadPlayerRecord record = 2;
}

message PayloadPlayerSaveRequest {
	PayloadPlayerRecord record = 1;
}

message PayloadPlayerSaveResponse {
	bool is_succeeded = 1;
}
