syntax = "proto3";

package Proto;

import "google/protobuf/empty.proto";
import "process/db/user/login.proto";
import "process/db/user/logout.proto";
import "process/db/user/signup.proto";

// Gateway → UserDb: user management.
service UserDbService {
  // Login: authenticate player and create session.
  rpc Login (PayloadLoginRequest)   returns (PayloadLoginResponse);

  // Logout: clear session and perform cleanup.
  rpc Logout(PayloadLogoutRequest)  returns (PayloadLogoutResponse);

  // Signup: create new player.
  rpc Signup(google.protobuf.Empty) returns (PayloadSignupResponse);
}
