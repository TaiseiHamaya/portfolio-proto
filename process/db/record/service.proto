syntax = "proto3";

package Proto;

import "process/db/record/player_create.proto";
import "process/db/record/player_load.proto";
import "process/db/record/player_save.proto";

// World → RecordPlayerDb: player data management.
service RecordPlayerDbService {
  // World -> RecordPlayerDb: create player and get player id.
  rpc CreatePlayer (PayloadPlayerCreateRequest) returns (PayloadPlayerCreateResponse);

  // World → RecordPlayerDb: load player data.
  rpc LoadPlayer   (PayloadPlayerLoadRequest)   returns (PayloadPlayerLoadResponse);

  // World → RecordPlayerDb: save player data.
  rpc SavePlayer   (PayloadPlayerSaveRequest)   returns (PayloadPlayerSaveResponse);
}
