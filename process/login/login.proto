syntax = "proto3";

package Proto;

import "common/math.proto";

enum CategoryLoginMessage {
	LOGIN_REQUEST = 0;
	LOGIN_RESULT = 1;
	LOGIN_NOTIFICATION = 2;
}

message PayloadLoginRequest {
	string username = 1;
}

message PayloadLoginResult {
	uint64 id = 1;
	bool is_succeeded = 2;
	Vector3 position = 4;
}

message PayloadLoginNotification {
	uint64 id = 1;
	string username = 2;
	Vector3 position = 3;
}