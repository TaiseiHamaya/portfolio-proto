syntax = "proto3";

package Proto;

import "google/protobuf/empty.proto";
import "process/login/login.proto";
import "process/login/logout.proto";

// Gateway → Login: authentication and session lifecycle.
service LoginService {
	rpc Login (PayloadLoginRequest)  returns (PayloadLoginResult);
	rpc Logout(PayloadLogoutRequest) returns (PayloadLogoutResponse);
}
