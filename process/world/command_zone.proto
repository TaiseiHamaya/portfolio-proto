syntax = "proto3";

package Proto;

message PayloadBeginRouteCommand {
  uint64          user_id        = 1;
  optional uint64 source_zone_id = 2;
  optional uint64 target_zone_id = 3;
}

message PayloadPlayerRouteCommandResponse {
  optional uint64 player_entity_id = 1;
}

// Zone -> World: command for zone initialization, player begin zone exit, etc.
service WorldCommand {
  // Zone -> World: player begin zone exit request.
  rpc BeginZoneRoute(PayloadBeginRouteCommand) returns (PayloadPlayerRouteCommandResponse);
}
