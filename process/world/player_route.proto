syntax = "proto3";

package Proto;

import "common/session.proto";

import "process/world/route_player_data.proto";

message PayloadPlayerZoneEnterBegin {
  uint64 user_id    = 1;
  uint64 gateway_id = 2;
}

message PayloadPlayerZoneEnterReady {
  uint64 user_id = 1;
}

message PayloadPlayerZoneEnterComplete {
  uint64 user_id = 1;
}

message PayloadPlayerZoneEnterCompleteResponse {
  optional RoutePlayerData player_data = 1;
}

message PayloadPlayerExitZoneBegin {
  uint64 user_id = 1;
}

message PayloadPlayerExitZoneReady {
  uint64 user_id = 1;
}

message PayloadPlayerExitZoneComplete {
  uint64 user_id = 1;
}
