syntax = "proto3";

package Proto;

import "common/math.proto";
import "common/session.proto";

message PayloadBeginZoneEnter {
  SessionId session_id = 1;
}

message PayloadBeginZoneExit {
  SessionId session_id = 1;
}

message PayloadExitZonePlayer {
  SessionId session_id = 1;
}

message PayloadRouteZonePlayer {
  SessionId session_id = 1;
}

message PayloadZoneEnterNotification {
  uint64  id       = 1;
  string  username = 2;
  Vector3 position = 3;
}

message PayloadZoneExitNotification {
	uint64 id = 1;
}
