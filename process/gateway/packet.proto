syntax = "proto3";

package Proto;

import "process/network/text.proto";
import "process/db/user/login.proto";
import "process/db/user/logout.proto";
import "process/db/user/signup.proto";
import "process/zone/sync.proto";
import "process/zone/enemy.proto";
import "process/zone/client_data_getter.proto";
import "process/world/player_route.proto";
import "process/lobby/start_game.proto";
import "process/lobby/end_game.proto";
import "process/lobby/enter.proto";
import "process/lobby/exit.proto";

// Gateway-facing routing packet: all payload types the gateway receives from
// clients and forwards to the appropriate internal process.
message ToServerMessage {
  oneof message {
    PayloadLoginRequest  login_request  = 1;
    PayloadLogoutRequest logout_request = 2;
    PayloadSignupRequest signup_request = 3;

    PayloadLobbyStartGameRequest start_game = 4;
    PayloadLobbyEndGameRequest   end_game   = 5;

    PayloadPlayerZoneEnterComplete player_zone_enter_complete = 6;

    PayloadTransformSync transform_sync = 7;
    PayloadPlayAction    play_action    = 8;

    PayloadTextMessage text_message = 9;
  }
}

message ToClientMessage {
  oneof message {
    PayloadLogoutResponse logout_response = 2;
    PayloadSignupResponse signup_response = 3;

    PayloadLobbyEnterResponse     lobby_enter_response = 4;
    PayloadLobbyStartGameResponse start_game_response  = 5;
    PayloadLobbyEndGameResponse   end_game_response    = 6;

    PayloadClientInitializerData client_initializer_data = 7;

    PayloadTransformSync         transform_sync          = 8;
    PayloadPlayAction            play_action             = 9;
    PayloadEntityDamaged         entity_damaged          = 10;
    PayloadEnemySpawn            enemy_spawn             = 11;
    PayloadEnemyDespawn          enemy_despawn           = 12;
    PayloadZoneEnterNotification zone_enter_notification = 13;
    PayloadZoneExitNotification  zone_exit_notification  = 14;

    PayloadTextMessage text_message = 15;
  }
}
